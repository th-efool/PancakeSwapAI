name: Publish to ClawHub

on:
  push:
    branches:
      - main
    paths:
      - 'packages/plugins/**/SKILL.md'
      - 'packages/plugins/**/.claude-plugin/plugin.json'

jobs:
  publish:
    name: Publish skills to ClawHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate plugins
        run: node scripts/validate-plugin.cjs

      - name: Install ClaWHub CLI
        run: npm install -g clawhub

      - name: Authenticate with ClaWHub
        run: clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish skills
        run: |
          node scripts/publish-clawhub.cjs \
            --changelog "Release from ${{ github.sha }}"
