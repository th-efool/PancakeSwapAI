description: 'Liquidity Planner Skill Evaluation'

# Run one test at a time — rubric grading LLM calls cause 429s at higher concurrency
concurrency: 1

prompts:
  - |
    You are an AI assistant. The user has loaded the following skill:

    <skill>
    {{skill_content}}
    </skill>

    Now answer the following user request:

    <user_request>
    {{case_content}}
    </user_request>

providers:
  - id: anthropic:claude-sonnet-4-5-20250929
    config:
      temperature: 0
      max_tokens: 4096

defaultTest:
  options:
    timeout: 180000
  vars:
    skill_content: file://../../../packages/plugins/pancakeswap-driver/skills/liquidity-planner/SKILL.md

tests:
  # Test 1: Basic V3 LP position on BSC — CAKE/BNB
  - vars:
      case_content: file://cases/basic-v3-lp.md
    assert:
      - type: llm-rubric
        value: |
          The response should guide the user through creating a V3 liquidity position for CAKE/BNB on BSC.
          It should mention fee tier selection (0.25% is typical for this pair), suggest a price range,
          warn about impermanent loss, and generate a deep link to pancakeswap.finance.
          The deep link should include the correct chain key (bsc) and fee amount.
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains
        value: 'pancakeswap.finance'
      - type: contains-any
        value:
          - '2500'
          - '0.25%'
          - 'fee'
      - type: contains-any
        value:
          - 'impermanent loss'
          - 'IL'
          - 'price range'

  # Test 2: Stablecoin LP — USDT/USDC on BSC
  - vars:
      case_content: file://cases/stablecoin-lp.md
    assert:
      - type: llm-rubric
        value: |
          The response should recommend StableSwap or V3 with 0.01% fee tier for a USDT/USDC pair on BSC.
          It should explain why StableSwap is optimised for stable pairs (amplification coefficient, lower slippage).
          A tight price range around 1.0 (e.g., 0.99-1.01) should be suggested for V3.
          The response should warn about low APY expectation for stablecoins.
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - 'StableSwap'
          - 'stableSwap'
          - '0.01%'
          - 'fee tier'
      - type: contains-any
        value:
          - '0.99'
          - '1.01'
          - 'tight range'
          - 'stable'

  # Test 3: Cross-chain LP — ETH/USDC on Arbitrum
  - vars:
      case_content: file://cases/crosschain-lp.md
    assert:
      - type: llm-rubric
        value: |
          The response should plan a V3 liquidity position for ETH/USDC on Arbitrum.
          It must use the correct chain key (arb) in the deep link. It should note that V2 and StableSwap
          are NOT available on Arbitrum (only V3). Fee tier should be 0.05% or 0.25%.
          Pool discovery via DexScreener should be mentioned.
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - 'arb'
          - 'Arbitrum'
          - 'arbitrum'
      - type: contains-any
        value:
          - 'DexScreener'
          - 'dexscreener'
          - 'pool'

  # Test 4: V2 LP on BSC
  - vars:
      case_content: file://cases/v2-lp.md
    assert:
      - type: llm-rubric
        value: |
          The response should explain V2 liquidity provision on PancakeSwap BSC.
          It should mention full-range liquidity, the 0.25% fixed fee (NOT 0.3% like Uniswap),
          ERC-20 LP tokens, and that V2 is only available on BSC.
          The deep link format should be pancakeswap.finance/v2/add/{tokenA}/{tokenB}.
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - '0.25%'
          - 'V2'
          - 'v2'
      - type: contains
        value: 'pancakeswap.finance'
