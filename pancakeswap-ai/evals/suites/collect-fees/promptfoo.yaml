description: 'Collect Fees Skill Evaluation'

# Run one test at a time — rubric grading LLM calls cause 429s at higher concurrency
concurrency: 1

prompts:
  - |
    You are an AI assistant. The user has loaded the following skill:

    <skill>
    {{skill_content}}
    </skill>

    Now answer the following user request:

    <user_request>
    {{case_content}}
    </user_request>

providers:
  - id: anthropic:claude-sonnet-4-5-20250929
    config:
      temperature: 0
      max_tokens: 4096

defaultTest:
  options:
    timeout: 180000
  vars:
    skill_content: file://../../../packages/plugins/pancakeswap-driver/skills/collect-fees/SKILL.md

tests:
  # Test 1: Basic V3 fee check on BSC
  - vars:
      case_content: file://cases/basic-fee-check.md
    assert:
      - type: llm-rubric
        value: |
          The response should identify this as a V3 fee collection request on BSC.
          It should mention looking up positions via the NonfungiblePositionManager contract
          using the provided wallet address, reference tokenId-based position discovery,
          and generate a deep link to pancakeswap.finance/liquidity with the bsc chain key.
          It should note that tokensOwed is a crystallised floor and actual fees may be higher.
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains
        value: 'pancakeswap.finance/liquidity'
      - type: contains-any
        value:
          - 'NonfungiblePositionManager'
          - 'tokenId'
          - 'tokensOwed'
          - 'positions('
      - type: contains-any
        value:
          - 'bsc'
          - 'BSC'
          - 'BNB Smart Chain'

  # Test 2: Cross-chain V3 fees on Base
  - vars:
      case_content: file://cases/crosschain-fees.md
    assert:
      - type: llm-rubric
        value: |
          The response should handle a V3 fee check on Base chain for an ETH/USDC position.
          It must use the correct NonfungiblePositionManager address for Base
          (0x46A15B0b27311cedF172AB29E4f4766fbE7F4364) and the correct RPC endpoint.
          The deep link should use chain key "base". It should mention tokenId lookup
          and pending fee amounts for token0 and token1.
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - 'base'
          - 'Base'
      - type: contains
        value: 'pancakeswap.finance/liquidity'
      - type: contains-any
        value:
          - '0x46A15B0b27311cedF172AB29E4f4766fbE7F4364'
          - 'NonfungiblePositionManager'
          - 'tokenId'

  # Test 3: Infinity positions on BSC
  - vars:
      case_content: file://cases/infinity-fees.md
    assert:
      - type: llm-rubric
        value: |
          The response should correctly explain the Infinity (v4) fee model:
          - Infinity uses a singleton PoolManager, not ERC-721 NFTs, so tokenId lookup is not applicable
          - CAKE farming rewards are auto-distributed every 8 hours via Merkle proofs (no manual harvest needed)
          - Positions are discovered via the PancakeSwap Explorer API (infinityCl and infinityBin endpoints)
          - CL pending fees are computed via TypeScript/node using @pancakeswap/infinity-sdk or equivalent
            TypeScript fee math (not Python/cast)
          - Directs user to the positions overview URL
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains
        value: 'pancakeswap.finance/liquidity/positions'
      - type: contains-any
        value:
          - 'explorer.pancakeswap.com'
          - 'Explorer API'
          - 'infinityCl'
          - 'infinityBin'
          - 'CLPositionManager'
          - 'PoolManager'
      - type: contains-any
        value:
          - 'auto'
          - 'automatic'
          - 'Merkle'
          - '8 hours'
          - 'no manual'
          - 'no harvest'

  # Test 4: Solana farm fee check
  - vars:
      case_content: file://cases/solana-fees.md
    assert:
      - type: llm-rubric
        value: |
          The response should correctly handle a Solana position/fee check:
          - Recognises the wallet as a Solana base58 public key (not an EVM 0x address)
          - Uses Raydium.load() (NOT new Farm()) to initialise the SDK
          - Calls getOwnerPositionInfo() to discover CLMM positions
          - Outputs clmmPositions and/or farmPositions as structured JSON (not instructionsBase64)
          - Does NOT generate unsigned transaction instructions or ask the user to sign anything
          - Does NOT request a private key
          - Directs user to pancakeswap.finance/farms?chain=sol
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - 'solana-core-sdk'
          - 'Raydium.load'
          - 'getOwnerPositionInfo'
          - 'clmmPositions'
          - 'farmPositions'
          - 'solana'
          - 'Solana'
      - type: not-contains-any
        value:
          - 'instructionsBase64'
          - 'harvestAllRewards'
          - 'new Farm('
      - type: contains
        value: 'pancakeswap.finance/farms'
